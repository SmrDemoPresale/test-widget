<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>CarPrice — демонстрационная страница с BPMSoft-чатом</title>

  <link rel="stylesheet" href="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/widget.css">

  <style>
    :root {
      --cp-green: #00a84f;
      --cp-green-dark: #009646;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    #client-page {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    #cp-chat-launcher {
      position: fixed;
      right: 15px;
      bottom: 15px;
      z-index: 2147482999;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: calc(100vw - 30px);
    }

    #cp-chat-launcher[hidden] {
      display: none !important;
    }

    .cp-chat-prompt,
    .cp-chat-round-button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .cp-chat-prompt {
      width: 149px;
      height: 48px;
      padding: 0 18px;
      border-radius: 18px;
      background: var(--cp-green);
      color: #fff;
      box-shadow: 0 5px 14px rgba(0, 122, 57, .22);
      font-size: 14px;
      font-weight: 700;
      line-height: 48px;
      white-space: nowrap;
      text-align: center;
    }

    .cp-chat-round-button {
      display: grid;
      place-items: center;
      flex: 0 0 60px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--cp-green);
      box-shadow: 0 5px 14px rgba(0, 122, 57, .25);
    }

    .cp-chat-prompt:hover,
    .cp-chat-round-button:hover {
      background: var(--cp-green-dark);
    }

    .cp-chat-round-button svg {
      display: block;
      width: 34px;
      height: 34px;
    }

    /*
      Важное ограничение: ниже нет правил для ленты сообщений,
      быстрых ответов, поля ввода и внутренних flex-контейнеров BPMSoft.
      Они полностью остаются под управлением штатного widget.css.
    */
    #bpmsoftocc-chat,
    #bpmsoftoccchat-container {
      position: relative;
      z-index: 2147483000 !important;
    }

    /* Скрываем только штатную оранжевую кнопку. Она остаётся в DOM для программного клика. */
    #bpmsoftoccchat-widget-startbutton,
    .bpmsoftoccchat-bot-button {
      position: fixed !important;
      right: -10000px !important;
      bottom: -10000px !important;
      width: 1px !important;
      height: 1px !important;
      min-width: 1px !important;
      min-height: 1px !important;
      opacity: 0 !important;
      overflow: hidden !important;
      pointer-events: none !important;
    }

    /* Документированные безопасные изменения оформления. */
    #bpmsoftoccchat-container .bpmsoftoccchat-conversation-body-profile {
      background: var(--cp-green) !important;
    }

    #bpmsoftoccchat-main-feed {
      background-color: #fff !important;
    }

    #bpmsoftoccchat-container .bpmsoftoccchat-messenger {
      background: #fff !important;
      border-radius: 15px !important;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .20), 0 0 2px rgba(0, 0, 0, .05) !important;
      overflow: hidden !important;
    }

    @media (max-width: 450px) {
      #cp-chat-launcher {
        right: 12px;
        bottom: 12px;
      }

      .cp-chat-prompt {
        display: none;
      }
    }
  </style>
</head>
<body>
  <iframe id="client-page" src="./carprice-page.html" title="Демонстрационная страница CarPrice"></iframe>

  <div id="cp-chat-launcher" aria-label="Открыть чат">
    <button class="cp-chat-prompt" data-open-bpmsoft type="button">Я тут, если что</button>
    <button class="cp-chat-round-button" data-open-bpmsoft type="button" aria-label="Открыть чат">
      <svg aria-hidden="true" viewBox="0 0 48 48">
        <path d="M10 8h28a5 5 0 0 1 5 5v20a5 5 0 0 1-5 5H24.2L14 44v-6h-4a5 5 0 0 1-5-5V13a5 5 0 0 1 5-5Z" fill="#fff"></path>
        <circle cx="17" cy="23" r="2.3" fill="#00a84f"></circle>
        <circle cx="24" cy="23" r="2.3" fill="#00a84f"></circle>
        <circle cx="31" cy="23" r="2.3" fill="#00a84f"></circle>
      </svg>
    </button>
  </div>

  <!-- Официальная точка монтирования BPMSoft. -->
  <div id="bpmsoftocc-chat"></div>

  <script>
    window.bpmsoftoccconfig = {};
    window.bpmsoftoccconfig.channelId = '0cf34a2b-70e4-4a6e-8b5e-0eb0dd8e9247';
    window.bpmsoftoccconfig.connectorUrl = 'https://bpmsoft-oc-connector1.cloudbpm.ru';

    window.bpmsoftoccconfig.title = 'CarPrice';
    window.bpmsoftoccconfig.subtitle = 'Мы тут и готовы помочь';
    window.bpmsoftoccconfig.themeColor = '#00a84f';
    window.bpmsoftoccconfig.showChannelPanel = false;
    window.bpmsoftoccconfig.chatMessagePlaceholder = 'Введите сообщение...';
    window.bpmsoftoccconfig.chatButtonsPlaceholder = 'Выберите один из предложенных вариантов';
    window.bpmsoftoccconfig.disableInputOnButtonMessages = true;
    window.bpmsoftoccconfig.enableFileUpload = true;
    window.bpmsoftoccconfig.isEmojiVisible = true;
    window.bpmsoftoccconfig.connectWssWithoutClick = true;
    window.bpmsoftoccconfig.sendInitialMessageOnWidgetButtonClick = true;
    window.bpmsoftoccconfig.initialMessageText = 'Клиент открыл виджет';
  </script>

  <!-- Скрипты оставлены в том же виде, в котором их выдала BPMSoft. -->
  <script src="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/widget.js" async></script>
  <script src="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/chunk-vendors.js" async></script>

  <script>
    (function () {
      var launcher = document.getElementById('cp-chat-launcher');
      var openButtons = document.querySelectorAll('[data-open-bpmsoft]');
      var opening = false;
      var observer;

      function getStartButton() {
        return document.getElementById('bpmsoftoccchat-widget-startbutton') ||
          document.querySelector('.bpmsoftoccchat-bot-button');
      }

      function getMessenger() {
        return document.querySelector('#bpmsoftoccchat-container .bpmsoftoccchat-messenger');
      }

      function isMessengerOpen() {
        var messenger = getMessenger();
        if (!messenger) return false;

        var style = window.getComputedStyle(messenger);
        var rect = messenger.getBoundingClientRect();

        return style.display !== 'none' &&
          style.visibility !== 'hidden' &&
          Number(style.opacity || 1) > 0 &&
          rect.width > 40 &&
          rect.height > 40;
      }

      function syncLauncher() {
        if (!launcher) return;
        launcher.hidden = opening || isMessengerOpen();
      }

      function openChat() {
        if (opening || isMessengerOpen()) return;

        opening = true;
        syncLauncher();

        var attempts = 0;
        var timer = window.setInterval(function () {
          attempts += 1;
          var startButton = getStartButton();

          if (startButton) {
            window.clearInterval(timer);
            startButton.click();
            opening = false;
            window.setTimeout(syncLauncher, 100);
            window.setTimeout(syncLauncher, 500);
            return;
          }

          if (attempts >= 100) {
            window.clearInterval(timer);
            opening = false;
            syncLauncher();
            console.error('BPMSoft: штатная кнопка открытия не создана.');
          }
        }, 100);
      }

      openButtons.forEach(function (button) {
        button.addEventListener('click', openChat);
      });

      observer = new MutationObserver(function () {
        window.requestAnimationFrame(syncLauncher);
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['class', 'style', 'hidden', 'aria-hidden']
      });

      window.addEventListener('load', syncLauncher);
      window.addEventListener('resize', syncLauncher);
      syncLauncher();
    })();
  </script>
</body>
</html>
